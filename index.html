<html lang="en">
<head>

</head>
<body>
    <div class="intro-stone-wrap">
        <img src="img/sacred-stone.webp" alt="" class="intro-stone">
    </div>
    <div class="page-content">
    <h1>600 000 000 000</h1>
    <section id="team"></section>
    <footer>
        <div class="footer-actions">
            <a class="footer-button footer-button--text" href="https://memes.600.wtf">Meme's</a>
            <a class="footer-button footer-button--text" href="party.html">Parties</a>
            <a class="footer-button footer-button--text" href="liquid.html">Liquid</a>
            <a class="footer-button footer-button--text" href="ordinals.html">Ordinals</a>
            <a class="footer-button footer-button--text" href="business-cards.html">Business Cards</a>
            <a class="footer-button" href="http://6oooooofr5gqoz5rj3ykvw57umyaip46cbtzxu4fdurssvc6bm6kfsqd.onion" rel="noopener noreferrer" aria-label="Open 600 on Tor" title="6oooooofr5gqoz5rj3ykvw57umyaip46cbtzxu4fdurssvc6bm6kfsqd.onion">
                <img class="footer-button__logo" src="https://styleguide.torproject.org/static/images/tor-logo/color.svg" alt="Tor">
            </a>
        </div>
    </footer>
    </div>
    <script>
        // render mebers
        fetch('members.json', {
            headers: {
              'Content-Type': 'application/json'
            }
        }).then(response => {
            response.json().then((json => {
                let team = document.getElementById("team");
                json.members.forEach(member => {
                    let div = document.createElement("div");
                    div.className = "team";
                    let img = document.createElement("img");
                    let headline = document.createElement("h2");
                    let subline = document.createElement("h3");
                    let a = document.createElement("a");
                    a.href = `https://njump.me/${member.nostr}`;
                    a.target = "_blank";
                    a.innerHTML = "nostr";
                    img.src = member.img;
                    headline.innerHTML = member.name;
                    subline.innerHTML = member.role;
                    if (member.nickname) {
                        let nickname = document.createElement("p");
                        nickname.innerHTML = member.nickname;
                        nickname.className = "team-nickname";
                        headline.appendChild(nickname);
                    }
                    div.appendChild(img);
                    div.appendChild(headline);
                    div.appendChild(subline);
                    div.appendChild(a);
                    team.appendChild(div);
                });
            }));
        });

    </script>
</body>
